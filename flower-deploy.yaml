apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyndrl-flower-app
  labels:
    app: kyndrl-flower-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kyndrl-flower-app
  template:
    metadata:
      labels:
        app: kyndrl-flower-app
    spec:
      containers:
      - name: kyndrl-flower-app
        image: muralisocial123/kyndrl-flower-app:v1.1.0
        ports:
        - containerPort: 3015
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        env:
        - name: NODE_ENV
          value: "production"
        readinessProbe:
          httpGet:
            path: /
            port: 3015
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3015
          initialDelaySeconds: 20
          periodSeconds: 20