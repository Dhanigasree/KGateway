apiVersion: apps/v1
kind: Deployment
metadata:
  name: flipkart-clone
  labels:
    app: flipkart-clone
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flipkart-clone
  template:
    metadata:
      labels:
        app: flipkart-clone
    spec:
      containers:
      - name: flipkart-clone
        image: muralisocial123/flipkart-clone-kuberox:v1.1.0
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 20